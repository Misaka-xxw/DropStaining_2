<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>登录 - 冰免染色机</title>
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body class="login-screen single-login-screen">
  <section class="login-card modern-card single-login-card">
    <div class="login-title-block">
      <h1>冰免染色机网页登录</h1>
      <p>输入账号密码后选择登录身份。管理员可进入调试和用户管理，实验员进入日常操作页面。</p>
    </div>

    <div class="single-login-form">
      <label class="field-label">账号
        <input id="username" class="input input-xl" value="admin" autocomplete="username" placeholder="账号">
      </label>
      <label class="field-label">密码
        <input id="password" class="input input-xl" type="password" value="123456" autocomplete="current-password" placeholder="密码">
      </label>
      <div class="single-login-actions">
        <button class="btn btn-primary btn-xl" type="button" onclick="login('admin')">管理员登录</button>
        <button class="btn btn-xl btn-operator" type="button" onclick="login('operator')">实验员登录</button>
      </div>
    </div>
  </section>

  <div id="toast" class="toast hidden"></div>
  <script src="/static/js/api.js"></script>
  <script>
    async function login(role){
      const payload = { username: username.value, password: password.value, role };
      const res = await api('/api/login', { method:'POST', body: JSON.stringify(payload) });
      if(res.ok){ location.href = res.redirect; }
    }
    [username, password].forEach(input => {
      input.addEventListener('keydown', evt => {
        if(evt.key === 'Enter') login('operator');
      });
    });
  </script>
</body>
</html>

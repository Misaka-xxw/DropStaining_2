<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>冰免染色机 · 主控台</title>
<style>
  :root {
    --bg:#f5f7fb; --panel:#ffffff; --ink:#172033; --muted:#718096; --line:#d8dee9;
    --blue:#2563eb; --cyan:#06b6d4; --green:#10b981; --amber:#f59e0b; --red:#ef4444;
    --purple:#7c3aed; --reagent:#facc15; --work:#e0f2fe; --metal:#94a3b8;
    --shadow: 0 12px 34px rgba(15, 23, 42, .10);
    --radius: 18px;
  }
  * { box-sizing: border-box; }
  html, body { height:100%; margin:0; font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif; background:var(--bg); color:var(--ink); }
  body { overflow:hidden; }
  .app { height:100vh; display:grid; grid-template-rows:70px 1fr; }
  body.embedded-host .app { grid-template-rows:1fr; }
  body.embedded-host header { display:none; }
  body.embedded-host main { height:100vh; padding:0; gap:14px; }
  body.embedded-host .stage-card, body.embedded-host .side-card { border-radius:0; box-shadow:none; }
  header {
    display:flex; align-items:center; justify-content:space-between; gap:20px;
    padding:12px 24px; background:linear-gradient(90deg,#0f172a,#1e3a8a 56%,#0f766e);
    color:white; box-shadow:0 8px 24px rgba(15,23,42,.18); z-index:2;
  }
  .brand { display:flex; align-items:center; gap:14px; min-width:220px; }
  .logo { width:42px; height:42px; border-radius:12px; background:rgba(255,255,255,.14); display:grid; place-items:center; font-weight:800; letter-spacing:.04em; border:1px solid rgba(255,255,255,.24); }
  .brand h1 { margin:0; font-size:24px; line-height:1.1; }
  .brand small { display:block; margin-top:4px; opacity:.78; font-size:12px; }
  .top-status { display:flex; gap:10px; align-items:center; flex-wrap:wrap; justify-content:flex-end; }
  .pill { border:1px solid rgba(255,255,255,.24); background:rgba(255,255,255,.10); border-radius:999px; padding:7px 12px; font-size:13px; display:flex; align-items:center; gap:8px; }
  .pill.console-nav { color:#fff; text-decoration:none; font-weight:700; }
  .pill.console-nav:hover { background:rgba(255,255,255,.18); transform:translateY(-1px); }
  .dot { width:9px; height:9px; border-radius:50%; background:var(--green); box-shadow:0 0 0 4px rgba(16,185,129,.2); display:inline-block; }
  .dot.warn { background:var(--amber); box-shadow:0 0 0 4px rgba(245,158,11,.20); }
  .dot.err { background:var(--red); box-shadow:0 0 0 4px rgba(239,68,68,.20); }
  main { display:grid; grid-template-columns:minmax(820px, 1fr) 390px; gap:16px; padding:16px; min-height:0; }
  .stage-card, .side-card { background:var(--panel); border:1px solid #e6ebf3; border-radius:var(--radius); box-shadow:var(--shadow); min-height:0; }
  .stage-card { display:grid; grid-template-rows:52px 1fr 52px; overflow:hidden; }
  .stage-toolbar { display:flex; align-items:center; justify-content:space-between; padding:10px 14px; border-bottom:1px solid #e8edf5; background:linear-gradient(180deg,#fff,#f8fafc); }
  .toolbar-left, .toolbar-right { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  button, .file-label {
    border:1px solid #d8e0ec; background:#fff; color:#172033; border-radius:12px; padding:9px 12px; font-size:13px;
    cursor:pointer; min-height:38px; transition:.16s ease; user-select:none;
  }
  button:hover, .file-label:hover { border-color:#94a3b8; transform:translateY(-1px); box-shadow:0 4px 10px rgba(15,23,42,.08); }
  button.primary { background:linear-gradient(180deg,#3b82f6,#2563eb); color:white; border-color:#2563eb; }
  button.danger { background:#fff1f2; color:#be123c; border-color:#fecdd3; }
  button.ghost { background:#f8fafc; }
  button:disabled { opacity:.45; cursor:not-allowed; transform:none; box-shadow:none; }
  input[type=file] { display:none; }
  .map-wrap { position:relative; padding:0; overflow:hidden; background:
    radial-gradient(circle at 20% 16%, rgba(37,99,235,.08), transparent 24%),
    linear-gradient(180deg,#fbfdff,#eef4fb); }
  #twinSvg { width:100%; height:100%; display:block; touch-action:none; }
  .footer-strip { display:grid; grid-template-columns:1fr auto; gap:12px; align-items:center; padding:8px 14px; border-top:1px solid #e8edf5; background:#fbfdff; }
  .legend { display:flex; gap:10px; align-items:center; flex-wrap:wrap; font-size:12px; color:#475569; }
  .legend span { display:flex; align-items:center; gap:6px; }
  .sw { width:13px; height:13px; border-radius:4px; border:1px solid rgba(15,23,42,.12); display:inline-block; }
  .sw.idle { background:#e5e7eb; } .sw.run { background:#60a5fa; } .sw.done { background:#34d399; } .sw.warn { background:#fbbf24; } .sw.err { background:#fb7185; } .sw.open { background:#c084fc; }
  .coord-readout { display:none; }
  .side { display:grid; grid-template-rows:auto 1fr; gap:12px; min-height:0; }
  .side-card { padding:14px; overflow:hidden; }
  .side-card h2 { font-size:15px; margin:0 0 10px 0; display:flex; align-items:center; justify-content:space-between; }
  .subtle { color:var(--muted); font-size:12px; font-weight:400; }
  .kpi-grid { display:grid; grid-template-columns:repeat(2, 1fr); gap:8px; }
  .kpi { border:1px solid #e5eaf3; border-radius:14px; padding:8px 10px; background:#fbfdff; }
  .kpi b { display:inline; font-size:16px; margin:0 6px 0 0; }
  .kpi small { color:#64748b; font-size:11px; display:inline; }
  .kpi-line { display:flex; align-items:baseline; gap:6px; flex-wrap:nowrap; white-space:nowrap; margin-bottom:6px; }
  .progress { height:8px; background:#e9eef7; border-radius:999px; overflow:hidden; }
  .progress > i { display:block; height:100%; width:0%; background:linear-gradient(90deg,#38bdf8,#2563eb); border-radius:999px; transition:width .4s ease; }
  .channels { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
  .channel-card { border:1px solid #e5eaf3; border-radius:14px; background:#fbfdff; padding:10px; cursor:pointer; transition:.16s ease; }
  .channel-card.selected { border-color:#2563eb; box-shadow:0 0 0 3px rgba(37,99,235,.12); transform:translateY(-1px); }
  .channel-card.open { border-color:#a855f7; background:#faf5ff; }
  .channel-head { display:flex; justify-content:space-between; gap:6px; align-items:center; font-size:13px; font-weight:700; }
  .state-chip { padding:3px 7px; border-radius:999px; font-size:11px; font-weight:700; color:#475569; background:#e2e8f0; }
  .state-chip.running { color:#1d4ed8; background:#dbeafe; } .state-chip.complete { color:#047857; background:#d1fae5; } .state-chip.error { color:#be123c; background:#ffe4e6; } .state-chip.open { color:#7e22ce; background:#f3e8ff; }
  .slide-tags { display:flex; gap:4px; margin:8px 0; }
  .slide-tags i { flex:1; height:22px; border-radius:7px; background:#e2e8f0; display:grid; place-items:center; font-style:normal; font-size:10px; color:#64748b; }
  .slide-tags i.has { background:#e0f2fe; color:#075985; } .slide-tags i.run { background:#dbeafe; color:#1d4ed8; } .slide-tags i.done { background:#d1fae5; color:#047857; }
  .liquid-list { display:grid; gap:8px; }
  .liquid-row { display:grid; grid-template-columns:56px 1fr 42px; gap:8px; align-items:center; font-size:12px; }
  .bar { height:10px; background:#e2e8f0; border-radius:999px; overflow:hidden; }
  .bar i { display:block; height:100%; background:linear-gradient(90deg,#22c55e,#06b6d4); width:70%; transition:width .4s ease, background .4s ease; }
  .bar.warn i { background:linear-gradient(90deg,#f59e0b,#f97316); } .bar.err i { background:linear-gradient(90deg,#ef4444,#dc2626); }
  .detail-box { border:1px solid #e5eaf3; border-radius:14px; background:#fbfdff; padding:10px; min-height:112px; font-size:12px; color:#334155; }
  .detail-box strong { display:block; font-size:14px; color:#111827; margin-bottom:6px; }
  .log-card { min-height:0; display:grid; grid-template-rows:auto 1fr; }
  .log-list { overflow:auto; border:1px solid #e5eaf3; border-radius:14px; background:#0f172a; padding:10px; color:#dbeafe; font-family:ui-monospace, SFMono-Regular, Consolas, monospace; font-size:12px; }
  .log-list p { margin:0 0 8px 0; line-height:1.35; } .log-list .warn { color:#fbbf24; } .log-list .err { color:#fb7185; } .log-list .ok { color:#86efac; }
  .svg-label { fill:#334155; font-weight:700; font-size:13px; paint-order:stroke; stroke:#fff; stroke-width:3px; stroke-linejoin:round; }
  .zone-label { fill:#0f172a; font-size:15px; font-weight:800; }
  .zone-badge { fill:rgba(255,255,255,.92); stroke:#cbd5e1; stroke-width:1.2; rx:14; filter:url(#softShadow); }
  .zone-badge.reagent { fill:rgba(254,240,138,.95); stroke:#facc15; }
  .zone-badge.work { fill:rgba(224,242,254,.96); stroke:#7dd3fc; }
  .zone-badge.service { fill:rgba(243,232,255,.96); stroke:#c4b5fd; }
  .zone-badge-text { fill:#0f172a; font-size:15px; font-weight:800; letter-spacing:.02em; }
  .level-bg { fill:#ffffff; stroke:#dbe2ea; stroke-width:1.8; opacity:.98; }
  .level-sector { opacity:.92; }
  .level-core { fill:rgba(255,255,255,.96); stroke:#ffffff; stroke-width:1.2; }
  .level-text { fill:#334155; font-size:10px; font-weight:700; }
  .op-pill { stroke-width:1.5; }
  .op-pill-text { font-size:8px; font-weight:800; text-anchor:middle; dominant-baseline:central; }
  .footer-op-legend { display:flex; gap:10px; align-items:center; justify-self:end; flex-wrap:wrap; font-size:12px; color:#475569; }
  .footer-op-legend span { display:flex; align-items:center; gap:6px; }
  .footer-op-title { font-weight:800; color:#0f172a; margin-right:2px; }
  .shape-icon { display:inline-block; width:12px; height:12px; color:inherit; }
  .shape-icon.circle { border:2px solid currentColor; border-radius:50%; background:#fff; }
  .shape-icon.square { border:2px solid currentColor; background:#fff; border-radius:2px; }
  .shape-icon.triangle { width:0; height:0; border-left:7px solid transparent; border-right:7px solid transparent; border-bottom:12px solid currentColor; }
  .shape-icon.diamond { border:2px solid currentColor; background:#fff; transform:rotate(45deg); width:10px; height:10px; }
  .op-c1 { color:#2563eb; } .op-c2 { color:#10b981; } .op-c3 { color:#f59e0b; } .op-c4 { color:#7c3aed; } .op-c5 { color:#0891b2; }
  .port-hole { fill:#ffffff; stroke:#64748b; stroke-width:1.5; }
  .port-hole.waste { stroke:#f59e0b; }
  .port-hole.toxic { stroke:#ef4444; }
  .port-hole.clean { stroke:#06b6d4; }
  .port-hole.active { filter:drop-shadow(0 0 6px rgba(37,99,235,.35)); }
  .port-label { fill:#475569; font-size:9px; font-weight:700; paint-order:stroke; stroke:#fff; stroke-width:2px; }
  .camera-housing { fill:#111827; stroke:#334155; stroke-width:1.4; filter:drop-shadow(0 3px 4px rgba(15,23,42,.22)); }
  .camera-mount { fill:#334155; stroke:#475569; stroke-width:1.1; }
  .camera-lens { fill:#93c5fd; stroke:#1d4ed8; stroke-width:1.2; }
  .camera-inner { fill:#e0f2fe; opacity:.95; }
  .camera-status { stroke:#ffffff; stroke-width:1.2; }
  .camera-status.idle { fill:#94a3b8; }
  .camera-status.active { fill:#2563eb; animation:pulseCamera 1s infinite; }
  .camera-status.complete { fill:#22c55e; }
  .camera-status.error { fill:#ef4444; animation:pulseCamera .75s infinite; }
  .camera-beam { fill:#60a5fa; opacity:.16; animation:beamPulse 1s infinite; }
  .camera-mark { fill:#334155; font-size:10px; font-weight:800; paint-order:stroke; stroke:#fff; stroke-width:2px; }
  .camera-state-text { fill:#475569; font-size:9px; font-weight:700; paint-order:stroke; stroke:#fff; stroke-width:2px; }
  .arm-fluid-a { fill:#ef4444; }
  .arm-fluid-b { fill:#3b82f6; }
  .arm-fluid-mix { fill:#10b981; }
  .arm-fluid-reagent { fill:#f59e0b; }
  .arm-fluid-empty { fill:#ffffff; }
  .needle-shell { stroke:#334155; stroke-width:1.4; }
  .needle-liquid-ring { fill:none; stroke-width:2; opacity:.9; }
  .slide-step-label { fill:#334155; font-size:9px; font-weight:700; }
  .zone { fill:rgba(255,255,255,.52); stroke:#cbd5e1; stroke-width:1.4; rx:16; }
  .zone.reagent { fill:rgba(250,204,21,.09); stroke:#facc15; } .zone.work { fill:rgba(14,165,233,.08); stroke:#7dd3fc; } .zone.service { fill:rgba(124,58,237,.06); stroke:#c4b5fd; }
  .grid-line { stroke:#e2e8f0; stroke-width:.8; stroke-dasharray:4 6; }
  .axis { stroke:#64748b; stroke-width:1.2; marker-end:url(#arrow); }
  .axis-text { fill:#475569; font-size:11px; font-family:ui-monospace, Consolas, monospace; }
  .part circle, .part rect { transition:fill .2s ease, stroke .2s ease, opacity .2s ease, filter .2s ease, transform .2s ease; cursor:pointer; }
  .part text { pointer-events:none; user-select:none; }
  .part.reagent circle { stroke:#a16207; stroke-width:1.2; }
  .part.wash circle { fill:#dbeafe; stroke:#2563eb; stroke-width:1.2; }
  .part.mix circle { stroke:#0f766e; stroke-width:1.2; }
  .part.ab circle { stroke:#be123c; stroke-width:1.4; }
  .part.motor rect { fill:#d1d5db; stroke:#475569; stroke-width:1.4; }
  .part.slide rect { fill:#e2e8f0; stroke:#64748b; stroke-width:1.2; rx:3; }
  .part[data-state="scanned"] circle, .part[data-state="scanned"] rect { stroke:#047857; stroke-width:1.6; }
  .part[data-state="ready"] circle, .part[data-state="ready"] rect { stroke:#1d4ed8; stroke-width:1.6; }
  .part[data-state="running"] circle, .part[data-state="running"] rect { stroke:#1d4ed8; stroke-width:1.9; filter:drop-shadow(0 0 7px rgba(37,99,235,.45)); }
  .part[data-state="complete"] circle, .part[data-state="complete"] rect { stroke:#15803d; stroke-width:1.8; }
  .part[data-state="low"] circle, .part[data-state="low"] rect { stroke:#b45309; stroke-width:1.9; animation:pulseWarn 1s infinite; }
  .part[data-state="error"] circle, .part[data-state="error"] rect { stroke:#be123c; stroke-width:1.9; animation:pulseErr .8s infinite; }
  .part[data-active="true"] circle, .part[data-active="true"] rect { stroke:#111827; stroke-width:3.2; filter:drop-shadow(0 0 8px rgba(15,23,42,.35)); }
  .part.dim { opacity:.35; }
  .channel-tray { fill:rgba(148,163,184,.10); stroke:#94a3b8; stroke-width:1.3; rx:7; transition:.2s ease; }
  .channel-tray.selected { stroke:#1d4ed8; stroke-width:3; filter:drop-shadow(0 0 8px rgba(37,99,235,.25)); }
  .channel-tray.running { fill:rgba(96,165,250,.13); stroke:#2563eb; }
  .channel-tray.complete { fill:rgba(52,211,153,.15); stroke:#059669; }
  .channel-tray.open { fill:rgba(192,132,252,.18); stroke:#8b5cf6; animation:pulseOpen 1s infinite; }
  .arm-rail { stroke:#334155; stroke-width:10; stroke-linecap:round; opacity:.88; }
  .arm-rail-light { stroke:#cbd5e1; stroke-width:3; stroke-linecap:round; }
  .arm-y { stroke:#111827; stroke-width:7; stroke-linecap:round; filter:drop-shadow(0 5px 8px rgba(15,23,42,.18)); }
  .arm-head { fill:#111827; stroke:#fff; stroke-width:2; }
  .needle { fill:#f8fafc; stroke:#0f172a; stroke-width:1.5; }
  .needle.extended { fill:#60a5fa; filter:drop-shadow(0 0 7px rgba(37,99,235,.5)); }
  .needle.warn { fill:#f59e0b; }
  .needle-line { stroke:#0f172a; stroke-width:1.2; }
  .path { fill:none; stroke:#2563eb; stroke-width:2.2; stroke-dasharray:7 6; opacity:.35; }
  .target-halo { fill:none; stroke:#2563eb; stroke-width:2; opacity:.8; animation:halo 1.1s infinite ease-out; }
  @keyframes pulseWarn { 0%,100% { filter:drop-shadow(0 0 0 rgba(245,158,11,.2)); } 50% { filter:drop-shadow(0 0 10px rgba(245,158,11,.72)); } }
  @keyframes pulseErr { 0%,100% { filter:drop-shadow(0 0 0 rgba(239,68,68,.2)); } 50% { filter:drop-shadow(0 0 11px rgba(239,68,68,.78)); } }
  @keyframes pulseOpen { 0%,100% { opacity:1; } 50% { opacity:.45; } }
  @keyframes pulseCamera { 0%,100% { opacity:1; } 50% { opacity:.38; } }
  @keyframes beamPulse { 0%,100% { opacity:.10; } 50% { opacity:.28; } }
  @keyframes halo { from { r:6; opacity:.9; } to { r:23; opacity:0; } }
  @media (max-width:1100px) { body { overflow:auto; } .app { height:auto; min-height:100vh; } main { grid-template-columns:1fr; } .side { grid-template-columns:1fr; } .footer-strip { grid-template-columns:1fr; } .footer-op-legend { justify-self:start; } }
</style>
</head>
<body class="embedded-host">
<div class="app">
  <header>
    <div class="brand">
      <div class="logo">DT</div>
      <div><h1>冰免染色机</h1></div>
    </div>
    <div class="top-status">
      <span class="pill"><span id="connDot" class="dot"></span><span id="connText">设备在线 / 模拟模式</span></span>
      <span class="pill">流程：<b id="phaseText">待机</b></span>
      <span class="pill">样本数：<b id="sampleCount">0</b>/16</span>
      <a class="pill console-nav" href="/dashboard" target="_top">总览</a>
      <a class="pill console-nav" href="/samples" target="_top">样本</a>
      <a class="pill console-nav" href="/reagents" target="_top">试剂</a>
      <a class="pill console-nav" href="/run" target="_top">运行</a>
      <a class="pill console-nav" href="/alerts" target="_top">告警</a>
      <a class="pill console-nav" href="/history" target="_top">历史</a>
          </div>
  </header>
  <main>
    <section class="stage-card">
      <div class="stage-toolbar">
        <div class="toolbar-left">
          <button class="primary" id="startBtn">▶ 开始演示流程</button>
          <button id="pauseBtn" disabled>暂停</button>
          <button id="resetBtn" class="ghost">复位</button>
          <button id="scanSamplesBtn">扫描样本区</button>
          <button id="scanReagentsBtn">扫描试剂区</button>
        </div>
        <div class="toolbar-right">
          <button id="lowReagentBtn">试剂不足</button>
          <button id="pullChannelBtn">通道抽出</button>
          <button class="danger" id="alarmBtn">液位报警</button>
          <label class="file-label" for="csvInput">导入布局 CSV</label><input type="file" id="csvInput" accept=".csv,text/csv" />
        </div>
      </div>
      <div class="map-wrap">
        <svg id="twinSvg" viewBox="0 0 1180 700" role="img" aria-label="病理染色仪二维数字孪生示意图">
          <defs>
            <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L6,3 L0,6 Z" fill="#64748b" /></marker>
            <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.12"/></filter>
          </defs>
          <g id="zonesLayer"></g>
          <g id="gridLayer"></g>
          <g id="pathLayer"></g>
          <g id="traysLayer"></g>
          <g id="auxLayer"></g>
          <g id="dataLayer"></g>
          <g id="opsLayer"></g>
          <g id="axisLayer"></g>
          <g id="armLayer"></g>
          <g id="labelLayer"></g>
          <g id="haloLayer"></g>
        </svg>
      </div>
      <div class="footer-strip">
        <div class="legend"><span><i class="sw idle"></i>空闲</span><span><i class="sw run"></i>运行/扫描</span><span><i class="sw done"></i>完成</span><span><i class="sw warn"></i>不足/接近阈值</span><span><i class="sw err"></i>故障</span><span><i class="sw open"></i>通道抽出</span></div>
        <div class="footer-op-legend"><span class="footer-op-title">玻片步骤</span><span><i class="shape-icon circle op-c1"></i>扫码</span><span><i class="shape-icon square op-c2"></i>加样</span><span><i class="shape-icon triangle op-c3"></i>混匀</span><span><i class="shape-icon diamond op-c4"></i>染色</span><span><i class="shape-icon circle op-c5"></i>清洗</span></div>
      </div>
    </section>

    <aside class="side">
      <section class="side-card">
        <h2>运行总览 <span class="subtle" id="clockText"></span></h2>
        <div class="kpi-grid">
          <div class="kpi"><div class="kpi-line"><b id="kpiProgress">0%</b><small>总进度</small></div><div class="progress"><i id="overallBar"></i></div></div>
          <div class="kpi"><div class="kpi-line"><b id="kpiStep">0/0</b><small>演示步骤</small></div><div class="progress"><i id="stepBar"></i></div></div>
          <div class="kpi"><div class="kpi-line"><b id="kpiTemp">8℃</b><small>试剂区制冷</small></div></div>
                  </div>
      </section>

      <section class="side-card log-card">
        <div>
          <h2>设备状态 / 选中对象</h2>
          <div class="detail-box" id="detailBox"><strong>未选中对象</strong>点击任意试剂、玻片、洗针头、配液位或混匀电机，可查看状态、余量与步骤进度。</div>
          <h2 style="margin-top:12px">液位与事件日志</h2>
          <div class="liquid-list" id="liquidList"></div>
        </div>
        <div class="log-list" id="logList" aria-live="polite"></div>
      </section>
    </aside>
  </main>
</div>

function nullableNumber(v) { if(v === null || v === undefined || v === '') return null; const n = Number(v); return Number.isFinite(n) ? n : null; }

function calcTransform() {
  const xs = coords.map(d=>d.x).filter(Number.isFinite), ys = coords.map(d=>d.y).filter(Number.isFinite);
  const minX = Math.min(-35, ...xs) - 10, maxX = Math.max(330, ...xs) + 10;
  const minY = Math.min(-24, ...ys) - 2, maxY = Math.max(210, ...ys) + 10;
  const scale = Math.min((VIEW.w - VIEW.padL - VIEW.padR) / (maxX - minX), (VIEW.h - VIEW.padT - VIEW.padB) / (maxY - minY));
  transform = { minX, maxX, minY, maxY, scale };
}
function mmToPx(x, y) { return [VIEW.padL + (transform.maxX - x) * transform.scale, VIEW.padT + (y - transform.minY) * transform.scale]; }
function pxToMm(px, py) { return [transform.maxX - (px - VIEW.padL) / transform.scale, transform.minY + (py - VIEW.padT) / transform.scale]; }
function mmSize(v) { return v * transform.scale; }
function el(name, attrs={}, children=[]) {

function polarToCartesian(cx, cy, r, angle) {
  const rad = (angle - 90) * Math.PI / 180.0;
  return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
}
function describeArc(cx, cy, r, startAngle, endAngle) {
  const start = polarToCartesian(cx, cy, r, endAngle);
  const end = polarToCartesian(cx, cy, r, startAngle);
  const largeArcFlag = endAngle - startAngle <= 180 ? '0' : '1';
  return ['M', start.x, start.y, 'A', r, r, 0, largeArcFlag, 0, end.x, end.y].join(' ');
}
function describeSector(cx, cy, r, startAngle, endAngle) {
  const safeEnd = Math.max(startAngle + 1, Math.min(endAngle, startAngle + 359.99));
  const start = polarToCartesian(cx, cy, r, safeEnd);
  const end = polarToCartesian(cx, cy, r, startAngle);
  const largeArcFlag = safeEnd - startAngle <= 180 ? '0' : '1';
  return ['M', cx, cy, 'L', start.x, start.y, 'A', r, r, 0, largeArcFlag, 0, end.x, end.y, 'Z'].join(' ');
}
function createOpShape(shape, cx, cy, size, filled, color, label='') {

  if(shape === 'square') return el('rect', { x:cx-size, y:cy-size, width:size*2, height:size*2, rx:2, ...common });
  if(shape === 'triangle') return el('path', { d:`M ${cx} ${cy-size} L ${cx+size} ${cy+size} L ${cx-size} ${cy+size} Z`, ...common });
  return el('path', { d:`M ${cx} ${cy-size} L ${cx+size} ${cy} L ${cx} ${cy+size} L ${cx-size} ${cy} Z`, ...common });
}

function ensureVisualData() {

  for(const key of [...slideOps.keys()]) if(!valid.has(key)) slideOps.delete(key);

    if(item.category === '玻片通道' && !slideOps.has(item.name)) slideOps.set(item.name, OP_DEFS.map(() => false));

function defaultLevelFor(item) {

function applyStepAction(step, begin=false) {
  const phase = document.getElementById('phaseText');
  phase.textContent = step.label;
  if(step.target) { currentTarget = findTarget(step.target); } else { currentTarget = null; }
  if(currentTarget) itemState.set(currentTarget.name, 'running');
  switch(step.action) {
    case 'home': {
      const hp = getHomePosition();
      arm.x = hp.x; arm.y = hp.y; arm.fluid1 = null; arm.fluid2 = null;
      channels.forEach(ch => { if(ch.state !== 'complete') ch.state = 'idle'; });
      break;
    }
    case 'wash':
      arm.fluid1 = null; arm.fluid2 = null;
      log('清洗针头：先洗内壁，再洗外壁，防止交叉污染', 'ok');
      break;
    case 'washEnd':
      arm.fluid1 = null; arm.fluid2 = null;
      (byCategory.get('玻片通道') || []).forEach(s => setSlideOp(s.name, 4, true));
      log('清洗针头：先洗内壁，再洗外壁，防止交叉污染', 'ok');
      break;
    case 'aspirateA':
      arm.fluid1 = 'A'; arm.fluid2 = null; itemLevels.set('A液', Math.max(0, (itemLevels.get('A液') || 0) - 6)); setLiquidDelta('pure', -2);
      log('A 液吸取完成：准备与 B 液混合', 'ok');
      break;
    case 'aspirateB':
      arm.fluid1 = 'B'; arm.fluid2 = 'A'; itemLevels.set('B液', Math.max(0, (itemLevels.get('B液') || 0) - 5)); setLiquidDelta('pbs', -2);
      log('B 液吸取完成：进入混合配液位', 'ok');
      break;
    case 'mix':
      arm.fluid1 = 'Mix'; arm.fluid2 = 'Mix';
      if(currentTarget) itemLevels.set(currentTarget.name, 72);
      log('配液位混合：2×4 小孔位用于临时配液', 'ok');
      break;
    case 'reagent':
      arm.fluid1 = 'Reagent'; arm.fluid2 = null;
      if(currentTarget) { itemLevels.set(currentTarget.name, Math.max(8, (itemLevels.get(currentTarget.name) || 0) - 18)); itemState.set(currentTarget.name, 'low'); }
      log('模拟：当前试剂位余量接近报警阈值', 'warn');
      break;
    case 'slide1':
      arm.fluid1 = 'Reagent'; arm.fluid2 = 'Reagent';
      if(currentTarget) { setSlideOp(currentTarget.name, 1, true); setSlideOp(currentTarget.name, 3, true); }
      updateChannelRunning(1, 28, '通道1开始染色');
      break;
    case 'motor1':
      arm.fluid1 = null; arm.fluid2 = null; setChannelSlideStep(1, 2); updateChannelRunning(1, 46, '通道1混匀电机启动');
      break;
    case 'slide2':
      arm.fluid1 = 'Reagent'; arm.fluid2 = 'Reagent';
      if(currentTarget) { setSlideOp(currentTarget.name, 1, true); setSlideOp(currentTarget.name, 3, true); }
      updateChannelRunning(2, 18, '通道2开始染色');
      break;
    case 'slide3':
      arm.fluid1 = 'Reagent'; arm.fluid2 = 'Reagent';
      if(currentTarget) { setSlideOp(currentTarget.name, 1, true); setSlideOp(currentTarget.name, 3, true); }
      updateChannelRunning(3, 12, '通道3开始染色');

    case 'slide4':

function updateChannelRunning(id, progress, message) {

  const slideItems = (byCategory.get('玻片通道') || []).filter(s => getChannelIdFromName(s.name) === id);

}

function animateArmTo(x, y, z1, z2, duration=900) {
  const start = {...arm}, end = { x, y, z1, z2 };
  const startTime = performance.now();
  return new Promise(resolve => {
    function frame(now) {
      if(cancelAnimation) return resolve(false);
      const t = Math.min(1, (now - startTime) / duration); const ease = t < .5 ? 2*t*t : 1 - Math.pow(-2*t+2,2)/2;
      arm.x = start.x + (end.x-start.x)*ease; arm.y = start.y + (end.y-start.y)*ease; arm.z1 = start.z1 + (end.z1-start.z1)*ease; arm.z2 = start.z2 + (end.z2-start.z2)*ease;
      updateArmVisual(); updateKpis();
      if(t < 1) requestAnimationFrame(frame); else resolve(true);
    }
    requestAnimationFrame(frame);
  });
}
async function runDemo() {
  if(running) return;
  running = true; paused = false; cancelAnimation = false; totalRuns++;
  document.getElementById('startBtn').disabled = true; document.getElementById('pauseBtn').disabled = false; document.getElementById('pauseBtn').textContent = '暂停';
  cameraStates.arm = 'active'; updateArmVisual(); log('演示流程启动：扫码、洗针、A/B 配液、加样、混匀、清洗', 'ok');
  while(currentStepIndex < DEMO_STEPS.length && !cancelAnimation) {
    while(paused && !cancelAnimation) await sleep(150);
    const step = DEMO_STEPS[currentStepIndex];
    const target = step.target ? findTarget(step.target) : null;
    const tx = Number.isFinite(step.x) ? step.x : target.x; const ty = Number.isFinite(step.y) ? step.y : target.y;
    currentTarget = target || null;
    applyStepAction(step, true);
    log(`步骤 ${currentStepIndex+1}/${DEMO_STEPS.length}：${step.label}`, '');
    const ok = await animateArmTo(tx, ty, step.z1 ?? 0, step.z2 ?? 0, step.duration || 900);
    if(!ok) break;
    await sleep(260);
    completeCurrentTarget();
    channels.forEach(ch => { if(ch.state === 'running') ch.progress = Math.min(96, ch.progress + 6); });
    renderChannelCards(); updateKpis();
    currentStepIndex++;
  }
  if(currentStepIndex >= DEMO_STEPS.length) { document.getElementById('phaseText').textContent = '完成'; currentStepIndex = 0; }
  running = false; paused = false; currentTarget = null;
  document.getElementById('startBtn').disabled = false; document.getElementById('pauseBtn').disabled = true; document.getElementById('pauseBtn').textContent = '暂停';
  updateVisualStates(); updateKpis();
}

  }
  box.innerHTML = `<strong>${escapeHtml(item.name)}</strong>
    类别：${escapeHtml(item.category)}　状态：${STATUS_TEXT[state] || state}<br>
    ${extra.length ? extra.join('<br>') : '点击运行按钮后可查看该对象状态变化。'}`;
}
function escapeHtml(s) { return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function renderChannelCards() {
  const wrap = document.getElementById('channelCards'); if(!wrap) return; wrap.innerHTML = '';
  channels.forEach(ch => {
    const card = document.createElement('div'); card.className = `channel-card ${selectedChannel===ch.id?'selected':''} ${ch.pulled?'open':''}`; card.dataset.channel = ch.id;
    const state = ch.pulled ? 'open' : ch.state;
    const chipCls = state === 'running' ? 'running' : state === 'complete' ? 'complete' : state === 'error' ? 'error' : state === 'open' ? 'open' : '';
    const slides = ch.slides.map((s,i) => { const color = STAIN_COLORS[s] || '#e2e8f0'; return `<i class="${ch.progress>=100?'done':ch.progress>0?'run':'has'}" style="background:${color};color:#0f172a">${s}</i>`; }).join('');
    card.innerHTML = `<div class="channel-head"><span>通道 ${ch.id}</span><span class="state-chip ${chipCls}">${STATUS_TEXT[state] || state}</span></div><div class="slide-tags">${slides}</div><div class="progress"><i style="width:${ch.progress}%"></i></div>`;
    card.addEventListener('click', () => { selectedChannel = ch.id; renderChannelCards(); updateVisualStates(); });
    wrap.appendChild(card);
  });
}
function setLiquidDelta(key, delta) { liquids[key] = Math.max(0, Math.min(100, liquids[key] + delta)); }
function renderLiquids() {
  const labels = { pure:'纯水', pbs:'PBS', waste:'废液', toxic:'排毒' };
  const wrap = document.getElementById('liquidList'); wrap.innerHTML = '';
  for(const key of ['pure','pbs','waste','toxic']) {
    const val = liquids[key]; const row = document.createElement('div'); row.className='liquid-row';
    const warn = (key==='waste' || key==='toxic') ? val>78 : val<25;
    const err = (key==='waste' || key==='toxic') ? val>90 : val<12;
    row.innerHTML = `<span>${labels[key]}</span><span class="bar ${err?'err':warn?'warn':''}"><i style="width:${val}%"></i></span><b>${Math.round(val)}%</b>`;
    wrap.appendChild(row);
  }
}
function updateKpis() {
  const avg = Math.round(channels.reduce((s,c)=>s+c.progress,0)/channels.length);
  document.getElementById('kpiProgress').textContent = avg + '%';
  document.getElementById('overallBar').style.width = avg + '%';
  document.getElementById('kpiStep').textContent = `${Math.min(currentStepIndex, DEMO_STEPS.length)}/${DEMO_STEPS.length}`;
  document.getElementById('stepBar').style.width = (currentStepIndex / DEMO_STEPS.length * 100) + '%';
  document.getElementById('kpiTemp').textContent = (8 + Math.sin(Date.now()/3000)*0.4).toFixed(1) + '℃';
}
function log(message, type='') {
  const logList = document.getElementById('logList');
  const p = document.createElement('p');
  const now = new Date();
  p.className = type; p.textContent = `[${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}] #${++logSerial} ${message}`;
  logList.prepend(p);
  while(logList.children.length > 80) logList.removeChild(logList.lastChild);
}
function setConn(kind) {
  const dot = document.getElementById('connDot'); dot.className = 'dot' + (kind==='warn'?' warn':kind==='err'?' err':'');
  document.getElementById('connText').textContent = kind==='err' ? '报警 / 需人工确认' : kind==='warn' ? '设备在线 / 有提醒' : '设备在线 / 模拟模式';
}

function scanSamples() {
  cameraStates.arm = 'active'; updateArmVisual();
  const slides = byCategory.get('玻片通道') || [];
  slides.forEach(s => { itemState.set(s.name, 'ready'); setSlideOp(s.name, 0, true); });
  channels.forEach(ch => { ch.state='idle'; ch.progress = Math.max(ch.progress, 0); });
  document.getElementById('sampleCount').textContent = slides.length;
  document.getElementById('phaseText').textContent = '样本区扫描完成';
  cameraStates.arm = 'complete'; updateArmVisual();
  log(`样本区扫描完成：识别 ${slides.length} 张玻片`, 'ok'); drawSlideOps(); updateVisualStates(); renderChannelCards();
}
function scanReagents() {
  cameraStates.reagent = 'active'; drawAuxPorts();
  (byCategory.get('试剂区') || []).forEach(r => itemState.set(r.name, 'scanned'));
  document.getElementById('phaseText').textContent = '试剂区扫描完成';
  cameraStates.reagent = 'complete'; drawAuxPorts();
  log('试剂区扫描完成：5×8 试剂位已映射', 'ok'); updateVisualStates();
}
function simulateLowReagent() {
  const reagents = byCategory.get('试剂区') || [];
  [4,12,27].forEach(i => { if(reagents[i]) { itemState.set(reagents[i].name, 'low'); itemLevels.set(reagents[i].name, 10 + i % 7); } });
  document.getElementById('phaseText').textContent = '试剂不足提醒';
  setConn('warn'); log('报警：检测到部分试剂余量低于阈值，请补充或更换', 'warn'); drawData(); updateVisualStates();
}
function togglePullChannel() {
  const ch = channels[selectedChannel-1]; ch.pulled = !ch.pulled; ch.state = ch.pulled ? 'open' : (ch.progress >= 100 ? 'complete' : ch.progress>0 ? 'running' : 'idle');
  const slides = (byCategory.get('玻片通道') || []).filter(s => getChannelIdFromName(s.name) === selectedChannel);
  slides.forEach(s => itemState.set(s.name, ch.pulled ? 'error' : (ch.progress ? 'running' : 'ready')));
  log(`通道${selectedChannel}${ch.pulled?'已抽出：界面闪烁提醒':'已推回：恢复状态显示'}`, ch.pulled?'warn':'ok');
  updateVisualStates(); renderChannelCards();
}
function simulateAlarm() {
  liquids.pure = 9; liquids.pbs = 18; liquids.waste = 93; liquids.toxic = 87;
  setConn('err'); document.getElementById('phaseText').textContent = '液位异常';
  log('液位异常：纯水不足 / 废液桶接近满，请处理后继续', 'err'); renderLiquids();
}

function parseCsv(text) {
  const lines = text.replace(/^﻿/, '').split(/\r?\n/).filter(line => line.trim());
  const headers = splitCsvLine(lines.shift());
  return lines.map(line => { const cols = splitCsvLine(line); const row = Object.fromEntries(headers.map((h,i)=>[h, cols[i] ?? ''])); return normalizeItem(row); }).filter(d => Number.isFinite(d.x) && Number.isFinite(d.y));
}
function splitCsvLine(line) {
  const out=[]; let cur='', quote=false;
  for(let i=0;i<line.length;i++) { const ch=line[i];
    if(ch==='"' && line[i+1]==='"') { cur+='"'; i++; }
    else if(ch==='"') quote=!quote;
    else if(ch===',' && !quote) { out.push(cur); cur=''; }
    else cur+=ch;
  } out.push(cur); return out;
}
function loadCsvFile(file) {
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const next = parseCsv(reader.result); if(next.length < 10) throw new Error('布局点数量过少');
      coords = next; itemState = new Map(); itemLevels = new Map(); slideOps = new Map(); currentStepIndex = 0; selectedName = null; selectedChannel = 1;
      renderAll(); renderDetail(null); log(`已导入布局 CSV：${file.name}，共 ${next.length} 个位置`, 'ok');
    } catch(err) { log('CSV 导入失败：' + err.message, 'err'); }
  };
  reader.readAsText(file, 'utf-8');
}

// 可供上位机/后端实时推送调用：window.digitalTwin.update({ arm:{x,y,z1,z2,fluid1,fluid2}, cameras:{reagent:'idle|active|complete|error', arm:'idle|active|complete|error'}, items:[{name,state,level}], slideOps:[{name,steps}], channels:[{id,state,progress,pulled}], liquids:{pure,pbs,waste,toxic} })
window.digitalTwin = {
  update(payload={}) {
    if(payload.arm) { arm = {...arm, ...payload.arm}; updateArmVisual(); }
    if(payload.cameras) { Object.assign(cameraStates, payload.cameras); drawAuxPorts(); updateArmVisual(); }
    if(Array.isArray(payload.items)) payload.items.forEach(it => { if(it.name) { if(it.state) itemState.set(it.name, it.state); if(Number.isFinite(it.level)) itemLevels.set(it.name, it.level); } });
    if(Array.isArray(payload.channels)) payload.channels.forEach(ch => { const target = channels[(ch.id||1)-1]; if(target) Object.assign(target, ch); });
    if(Array.isArray(payload.slideOps)) payload.slideOps.forEach(op => { if(op.name && Array.isArray(op.steps)) slideOps.set(op.name, op.steps.slice(0, OP_DEFS.length)); });
    if(payload.liquids) Object.assign(liquids, payload.liquids);
    drawData(); drawSlideOps(); updateVisualStates(); renderChannelCards(); renderLiquids(); updateKpis();
  },
  getState() { return { arm, channels, liquids, selectedName, currentStepIndex }; },
  reset: resetDemo
};

svg.addEventListener('click', () => { selectedName = null; renderDetail(null); updateVisualStates(); });
document.getElementById('startBtn').addEventListener('click', () => { cancelAnimation=false; runDemo(); });
document.getElementById('pauseBtn').addEventListener('click', () => { paused = !paused; document.getElementById('pauseBtn').textContent = paused ? '继续' : '暂停'; log(paused?'流程已暂停':'流程继续运行', paused?'warn':'ok'); });
document.getElementById('resetBtn').addEventListener('click', resetDemo);
document.getElementById('scanSamplesBtn').addEventListener('click', scanSamples);
document.getElementById('scanReagentsBtn').addEventListener('click', scanReagents);
document.getElementById('lowReagentBtn').addEventListener('click', simulateLowReagent);
document.getElementById('pullChannelBtn').addEventListener('click', togglePullChannel);
document.getElementById('alarmBtn').addEventListener('click', simulateAlarm);
document.getElementById('csvInput').addEventListener('change', e => { if(e.target.files && e.target.files[0]) loadCsvFile(e.target.files[0]); });
setInterval(() => { document.getElementById('clockText').textContent = new Date().toLocaleString('zh-CN', { hour12:false }); updateKpis(); }, 1000);

resetDemo();
log('页面加载完成：使用内嵌布局绘制 2D 数字孪生', 'ok');
log('交互提示：点击图元查看状态；使用按钮模拟扫码、运行、液位和通道抽出', '');
</script>
